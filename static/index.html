<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <title>Підготовка</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <button id="back-button" class="chrome-sentinel" type="button" hidden aria-label="Назад"></button>
      <span id="app-eyebrow" class="chrome-sentinel" hidden></span>
      <span id="app-title" class="chrome-sentinel" hidden>Підготовка</span>
      <span id="app-subtitle" class="chrome-sentinel" hidden></span>

      <section class="message-stack" id="messages-panel" hidden></section>

      <main class="app-main">
        <section class="screen-frame" id="main-panel"></section>
      </main>
    </div>

    <template id="empty-state-template">
      <div class="empty-state">
        <h2>Ще трохи</h2>
        <p>Екран з’явиться, щойно Mini App синхронізується з бекендом.</p>
      </div>
    </template>

    <script type="module" src="/static/app.js"></script>
  </body>
</html>
