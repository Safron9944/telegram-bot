<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <title>Підготовка</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260519-minimal-5" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div class="app" id="app">
      <button id="back-button" class="chrome-sentinel" type="button" hidden aria-label="Назад"></button>
      <span id="app-eyebrow" class="chrome-sentinel" hidden></span>
      <span id="app-title" class="chrome-sentinel" hidden>Підготовка</span>
      <span id="app-subtitle" class="chrome-sentinel" hidden></span>

      <section class="messages" id="messages-panel" hidden></section>

      <main class="screen" id="main-panel">
        <div class="screen-content">
          <div class="empty">
            <h2>Підключення…</h2>
            <p>Очікуємо дані від сервера.</p>
          </div>
        </div>
      </main>
    </div>

    <template id="empty-state-template">
      <div class="empty">
        <h2>Підключення…</h2>
        <p>Очікуємо дані від сервера.</p>
      </div>
    </template>

    <script>
      window.setTimeout(function () {
        if (window.__APP_READY__) return;
        var panel = document.querySelector("#main-panel");
        if (!panel) return;
        panel.innerHTML =
          '<div class="screen-content"><div class="empty">' +
          '<h2>Дані ще не прийшли</h2>' +
          '<p>Сервер не відповів або Telegram відкрив старий кеш.</p>' +
          '<button class="btn btn--primary" type="button" onclick="window.location.reload()">Оновити</button>' +
          '</div></div>';
      }, 16000);
    </script>
    <script type="module" src="/static/app.js?v=20260519-minimal-5"></script>
  </body>
</html>
