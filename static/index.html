<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <title>Підготовка</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button id="back-button" class="icon-button" type="button" hidden aria-label="Назад">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 5 8 12l7 7" />
          </svg>
        </button>

        <div class="topbar__copy">
          <div class="topbar__eyebrow" id="app-eyebrow">Підготовка</div>
          <h1 class="topbar__title" id="app-title">Підключення…</h1>
          <p class="topbar__subtitle" id="app-subtitle">
            Завантажуємо дані профілю та доступні сценарії підготовки.
          </p>
        </div>

        <div class="topbar__actions">
          <button id="refresh-button" class="icon-button" type="button" aria-label="Оновити">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 12a8 8 0 1 1-2.34-5.66M20 4v6h-6" />
            </svg>
          </button>

          <button id="theme-button" class="theme-button" type="button" aria-label="Перемкнути тему">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3a6 6 0 0 0 9 7.5A9 9 0 1 1 12 3Z" />
            </svg>
            <span class="theme-button__label">Тема</span>
          </button>
        </div>
      </header>

      <section class="message-stack" id="messages-panel" hidden></section>

      <main class="app-main">
        <section class="screen-frame" id="main-panel"></section>
      </main>
    </div>

    <template id="empty-state-template">
      <div class="empty-state">
        <h2>Ще трохи</h2>
        <p>Екран з’явиться, щойно Mini App синхронізується з бекендом.</p>
      </div>
    </template>

    <script type="module" src="/static/app.js"></script>
  </body>
</html>
