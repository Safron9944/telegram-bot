<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <title>Підготовка</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div class="app" id="app">
      <button id="back-button" class="chrome-sentinel" type="button" hidden aria-label="Назад"></button>
      <span id="app-eyebrow" class="chrome-sentinel" hidden></span>
      <span id="app-title" class="chrome-sentinel" hidden>Підготовка</span>
      <span id="app-subtitle" class="chrome-sentinel" hidden></span>

      <section class="messages" id="messages-panel" hidden></section>

      <main class="screen" id="main-panel"></main>

      <nav class="tabbar" id="tabbar" aria-label="Основна навігація">
        <button class="tab" type="button" data-tab="home" aria-label="Головна">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 11.5L12 4l9 7.5V20a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1z"/>
          </svg>
          <span>Головна</span>
        </button>
        <button class="tab" type="button" data-tab="learning" aria-label="Навчання">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 5.5A1.5 1.5 0 0 1 5.5 4H11v16H5.5A1.5 1.5 0 0 1 4 18.5zM13 4h5.5A1.5 1.5 0 0 1 20 5.5v13a1.5 1.5 0 0 1-1.5 1.5H13z"/>
          </svg>
          <span>Навчання</span>
        </button>
        <button class="tab" type="button" data-tab="testing" aria-label="Тест">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 3h6a1 1 0 0 1 1 1v1h2.5A1.5 1.5 0 0 1 20 6.5v13a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 4 19.5v-13A1.5 1.5 0 0 1 5.5 5H8V4a1 1 0 0 1 1-1zm0 2v2h6V5zm-2 8.2 1.4-1.4 2 2 4.2-4.2 1.4 1.4-5.6 5.6z"/>
          </svg>
          <span>Тест</span>
        </button>
        <button class="tab" type="button" data-tab="stats" aria-label="Статистика">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 20a1 1 0 0 1-1-1V11h4v9zm5.5 0a1 1 0 0 1-1-1V5h4v15zm5.5 0v-7h4v6a1 1 0 0 1-1 1z"/>
          </svg>
          <span>Статистика</span>
        </button>
        <button class="tab" type="button" data-tab="help" aria-label="Ще">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="6" cy="12" r="2"/>
            <circle cx="12" cy="12" r="2"/>
            <circle cx="18" cy="12" r="2"/>
          </svg>
          <span>Ще</span>
        </button>
      </nav>
    </div>

    <template id="empty-state-template">
      <div class="empty">
        <h2>Підключення…</h2>
        <p>Очікуємо дані від сервера.</p>
      </div>
    </template>

    <script type="module" src="/static/app.js"></script>
  </body>
</html>
